repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        args: ["--fail-under=10"]

      - id: pytest
        name: pytest (endpoints)
        entry: uv run pytest
        language: system
        args: ["-p", "no:warnings", "test/endpoints/", "--tb=short"]
        pass_filenames: false
        always_run: true
